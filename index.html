<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Batalha de Seguidores</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>

body{
background:#0f0f0f;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

input{
padding:12px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:12px;
background:#ff0050;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
margin:auto;
margin-top:30px;
width:80%;
border-collapse:collapse;
}

th{
background:#ff0050;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<h1>⚔️ Batalha de Seguidores</h1>

<input id="user" placeholder="@usuario">
<input id="pontos" placeholder="pontos">

<button onclick="entrar()">Entrar na batalha</button>

<table>

<thead>
<tr>
<th>Posição</th>
<th>Usuário</th>
<th>Pontos</th>
</tr>
</thead>

<tbody id="ranking"></tbody>

</table>

<script>

const firebaseConfig = {
apiKey: "SUA_API",
authDomain: "SEU_PROJETO.firebaseapp.com",
projectId: "SEU_PROJETO",
storageBucket: "SEU_PROJETO.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function entrar(){

let user = document.getElementById("user").value;
let pontos = parseInt(document.getElementById("pontos").value);

db.collection("ranking").add({
user:user,
pontos:pontos
});

}

function carregar(){

db.collection("ranking")
.orderBy("pontos","desc")
.onSnapshot(snapshot=>{

let html="";

snapshot.docs.forEach((doc,i)=>{

let d = doc.data();

html += `
<tr>
<td>#${i+1}</td>
<td>${d.user}</td>
<td>${d.pontos}</td>
</tr>
`;

});

document.getElementById("ranking").innerHTML = html;

});

}

carregar();

</script>

</body>
</html>
