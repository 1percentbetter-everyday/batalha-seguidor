<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Batalha de Seguidores</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

table{
margin:auto;
width:80%;
border-collapse:collapse;
margin-top:30px;
}

th, td{
padding:12px;
border-bottom:1px solid #333;
}

th{
background:#ff0050;
}

tr:hover{
background:#1a1a1a;
}

input{
padding:10px;
margin:10px;
}

button{
padding:10px;
background:#ff0050;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>⚔️ Batalha de Seguidores</h1>

<input id="nome" placeholder="@seuuser">
<input id="seguidores" placeholder="seguidores">
<button onclick="adicionar()">Entrar na batalha</button>

<table>

<thead>
<tr>
<th>Posição</th>
<th>Usuário</th>
<th>Seguidores</th>
</tr>
</thead>

<tbody id="ranking"></tbody>

</table>

<script>

let jogadores = [];

function adicionar(){

let nome = document.getElementById("nome").value;
let seguidores = parseInt(document.getElementById("seguidores").value);

jogadores.push({nome, seguidores});

jogadores.sort((a,b)=>b.seguidores-a.seguidores);

mostrar();

}

function mostrar(){

let tabela = document.getElementById("ranking");

tabela.innerHTML="";

jogadores.forEach((p,i)=>{

tabela.innerHTML += `
<tr>
<td>#${i+1}</td>
<td>${p.nome}</td>
<td>${p.seguidores}</td>
</tr>
`;

});

}

</script>

</body>
</html>
